<!-- =========================
  マップエディタ本体（FIX-1〜3適用版）
  FIX-1: テキストボックス選択/ズーム干渉・選択解除後の誤作成を抑制
  FIX-2: 基地ブロック整列配置のクリック/タップ導線を補強
  FIX-3: 設置不可能タイルが置いて即消える問題を抑制
========================= -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
body,#app{font-family:var(--font-sans);background:#fff}
#app{display:flex;flex-direction:column;height:100vh;min-height:400px}
#top-panel{flex-shrink:0;background:#fff;border-bottom:1px solid #e0e0e0;padding:.4rem .6rem;display:flex;flex-direction:column;gap:5px;z-index:20}
.toolbar{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.tile-btn{padding:4px 8px;border-radius:var(--border-radius-md);border:2px solid transparent;cursor:pointer;font-size:11px;background:var(--color-background-secondary);color:var(--color-text-primary);display:flex;align-items:center;gap:3px;white-space:nowrap}
.tile-btn.active{border-color:#222}.tile-btn:hover{border-color:var(--color-border-secondary)}
.swatch{display:inline-block;width:12px;height:12px;border-radius:2px;flex-shrink:0}
.row{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.row button,.row select,.row input[type=number],.row label{padding:4px 8px;font-size:11px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:#fff;color:#222;cursor:pointer;white-space:nowrap}
.row button:hover{background:#f5f5f5}
.row button:disabled{opacity:.4;cursor:default}
.row label{display:flex;align-items:center;gap:3px}
.row input[type=checkbox]{width:13px;height:13px;margin:0;cursor:pointer}
.row input[type=number]{width:46px}
.row input[type=color]{width:32px;height:24px;padding:1px 2px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);cursor:pointer}
.row input[type=range]{width:70px}
.subpanel{display:none;border-radius:var(--border-radius-md);padding:4px 8px;gap:4px;flex-wrap:wrap;align-items:center}
#obj-sub{background:#f5f5f5;border:.5px solid #d0d0d0}
#base-sub{background:#f0f4ff;border:.5px solid #a5b4fc}
#effect-sub{background:#fff4e6;border:.5px solid #fbbf24}
#block-ind-sub,#bind-text-sub,#bind-highlight-sub{background:#f0fff4;border:.5px solid #6ee7b7}
#tb-sub{background:#faf5ff;border:.5px solid #c084fc}
#move-sub{background:#f0f7ff;border:.5px solid #93c5fd}
#eraser-hint{background:#fff0f0;border:.5px solid #fca5a5}
#sel-actions{display:none;background:#fffbe6;border:.5px solid #f0c040;border-radius:var(--border-radius-md);padding:4px 8px;gap:4px;flex-wrap:wrap;align-items:center}
#sel-color-sub{display:none;background:#f5f0ff;border:.5px solid #c084fc;border-radius:var(--border-radius-md);padding:4px 8px;gap:4px;flex-wrap:wrap;align-items:center}
#align-sub{display:none;background:#f0f7ff;border:.5px solid #93c5fd;border-radius:var(--border-radius-md);padding:4px 8px;gap:4px;flex-wrap:wrap;align-items:center}
#arr-panel{display:none;background:#f0f7ff;border:.5px solid #93c5fd;border-radius:var(--border-radius-md);padding:5px 8px;gap:6px;flex-wrap:wrap;align-items:center}
#io-panel{display:none;background:#f8f8f8;border:.5px solid #ccc;border-radius:var(--border-radius-md);padding:6px 8px;gap:6px;flex-direction:column}
#grid-area{flex:1;overflow:auto;position:relative;background:#f0f0f0;touch-action:none}
#grid-wrap{position:relative;transform-origin:0 0;background:#fff;display:inline-block}
#status{font-size:11px;color:var(--color-text-secondary);min-height:13px}
.role-badge{position:absolute;left:2px;bottom:2px;font-size:9px;line-height:1;padding:2px 4px;border-radius:4px;background:rgba(255,255,255,0.92);color:#111;border:1px solid rgba(0,0,0,0.25);z-index:5;pointer-events:none;white-space:nowrap;max-width:90%;overflow:hidden;text-overflow:ellipsis}
#legend-panel{position:absolute;top:8px;right:8px;z-index:60;background:rgba(255,255,255,0.95);border:1px solid #d1d5db;border-radius:8px;padding:6px 8px;min-width:170px;max-width:240px;box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:11px}
.legend-title{font-weight:700;color:#111;margin-bottom:4px}
.legend-item{display:flex;align-items:center;gap:6px;margin:2px 0}
.legend-swatch{width:12px;height:12px;border-radius:2px;border:1px solid rgba(0,0,0,0.3);flex-shrink:0}
.legend-name{color:#222;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-el{position:absolute;box-sizing:border-box;user-select:none;overflow:hidden}
.tb-el.selected{outline:2px solid #a855f7;outline-offset:1px}
.tb-handle{position:absolute;width:10px;height:10px;background:#a855f7;border:1.5px solid #fff;border-radius:2px;z-index:35;cursor:pointer}
/* ver3.3313 */
/* モバイル版（タッチデバイス）向けのスタイル調整 */
@media (pointer: coarse) {
  /* メニューバー全体のサイズアップ */
  #top-panel {
    padding: 12px 16px !important;
    gap: 12px !important;
  }

  /* 入力欄とボタンをさらに大きく */
  /* フォントサイズ16px以上にすることでiOSの自動ズームを防止 */
  .tile-btn, 
  .row button, 
  .row select, 
  .row input[type=number],
  .row input[type=text],
  .row label,
  #status {
    font-size: 16px !important;
    height: 38px !important;
    padding: 0 10px !important;
    display: flex;
    align-items: center;
  }

  /* 数値入力欄の幅調整 */
  .row input[type=number] {
    width: 52px !important;
  }

  /* カラーピッカーのサイズ */
  .row input[type=color] {
    width: 40px !important;
    height: 38px !important;
  }

  /* ステータスバーは固定高さ（マップが動かないように） */
  #status {
    height: 22px !important;
    min-height: 22px !important;
    max-height: 22px !important;
    line-height: 22px !important;
    padding: 0 10px !important;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    box-sizing: border-box;
  }

  /* 移動モードはモバイルのみ表示 */
  #tb-move-mode-label {
    display: flex !important;
    align-items: center;
    height: auto !important;
    padding: 0 !important;
  }

  /* アプリ全体のスクロールを禁止し、マップ位置を固定する準備 */
  body, #app {
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
  }
}

// モバイル版のみ、トップパネル等でのピンチズーム（ズームイン・アウト）を無効化
if (IS_TOUCH) {
  document.addEventListener('touchstart', function (e) {
    // 2本指以上の操作かつ、ターゲットが grid-area 内でない場合
    if (e.touches.length > 1 && !e.target.closest('#grid-area')) {
      e.preventDefault();
    }
  }, { passive: false });

  // ダブルタップによるズームも防止
  document.addEventListener('touchend', function (e) {
    if (!e.target.closest('#grid-area')) {
      const now = (new Date()).getTime();
      if (now - (window.lastTouchEnd || 0) <= 300) {
        e.preventDefault();
      }
      window.lastTouchEnd = now;
    }
  }, { passive: false });
}

function clampScale(s){return Math.min(SCALE_MAX,Math.max(SCALE_MIN,Math.round(s*100)/100));}
function applyScale(s){scale=clampScale(s);document.getElementById('grid-wrap').style.transform=`scale(${scale})`;}
function touchDist(a,b){return Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);}
function touchMid(a,b){return{x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2};}
function clearMobilePreview(){mobilePreviewR=-1;mobilePreviewC=-1;}
function isTapEnd(e){const t=e.changedTouches[0];return Math.hypot(t.clientX-touchStartClientX,t.clientY-touchStartClientY)<TAP_DIST;}
function readIntField(id,dv){const v=parseInt(document.getElementById(id).value);return isNaN(v)?dv:v;}

function initGrid(){grid=Array.from({length:rows},()=>Array(cols).fill('floor'));regionGrid=Array.from({length:rows},()=>Array(cols).fill(null));blocks=[];textboxes=[];bindSelected=new Set();saveHistory();}
function saveHistory(){const s=JSON.stringify({rows,cols,grid:grid.map(r=>[...r]),regionGrid:regionGrid.map(r=>[...r]),blocks:blocks.map(b=>({...b})),textboxes:textboxes.map(t=>({...t}))});history=history.slice(0,historyIdx+1);history.push(s);if(history.length>80)history.shift();historyIdx=history.length-1;updateUR();}
function undo(){if(historyIdx<=0)return;historyIdx--;applyHistory();updateUR();}
function redo(){if(historyIdx>=history.length-1)return;historyIdx++;applyHistory();updateUR();}
function applyHistory(){const d=JSON.parse(history[historyIdx]);if(d.rows)rows=d.rows;if(d.cols)cols=d.cols;document.getElementById('rows-in').value=rows;document.getElementById('cols-in').value=cols;grid=d.grid;regionGrid=d.regionGrid;blocks=d.blocks;textboxes=d.textboxes||[];renderAll();}
function updateUR(){document.getElementById('btn-undo').disabled=historyIdx<=0;document.getElementById('btn-redo').disabled=historyIdx>=history.length-1;}

function hexAlpha(hex,alpha){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${alpha})`;}

function buildCSV(){let csv=`type,r,c,cells,color,barrier\nmeta,${rows},${cols},,\n`;for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){const t=grid[r][c];if(t!=='floor')csv+=`${t},${r},${c},1,\n`;const rg=regionGrid[r][c];if(rg)csv+=`region,${r},${c},1,${rg.hex},${rg.alpha}\n`;}blocks.forEach(b=>{const extras={};if(b.textLabel)extras.textLabel=b.textLabel;if(b.highlight)extras.highlight=b.highlight;const extrasStr=Object.keys(extras).length>0?encodeURIComponent(JSON.stringify(extras)):'';csv+=`block,${b.r},${b.c},${b.cells},${b.color},${b.barrier?1:0},${b.type},${extrasStr}\n`;});textboxes.forEach(tb=>{csv+=`textbox,${tb.r},${tb.c},${tb.w},${tb.h},${encodeURIComponent(JSON.stringify(tb))}\n`;});return csv;}
function parseCSV(text){const lines=text.split('\n').filter(l=>l.trim());let nr=30,nc=30;const nG=()=>Array.from({length:nr},()=>Array(nc).fill('floor'));const nRG=()=>Array.from({length:nr},()=>Array(nc).fill(null));const nB=[];const nTb=[];let g=null,rg=null;lines.forEach(line=>{const p=line.split(',');const type=p[0];if(type==='meta'){nr=parseInt(p[1]);nc=parseInt(p[2]);g=nG();rg=nRG();}else if(['contaminated','blocked'].includes(type)||type.startsWith('effectother_')||type.startsWith('gap_')){if(g)g[parseInt(p[1])][parseInt(p[2])]=type;}else if(type==='region'){if(rg)rg[parseInt(p[1])][parseInt(p[2])]={hex:p[4],alpha:parseFloat(p[5])};}else if(type==='block'){const blk={id:++idCounter,r:parseInt(p[1]),c:parseInt(p[2]),cells:parseInt(p[3]),color:p[4],barrier:p[5]==='1',type:p[6]||'base'};if(p[7]&&p[7].trim()){try{const ex=JSON.parse(decodeURIComponent(p[7]));if(ex.textLabel)blk.textLabel=ex.textLabel;if(ex.highlight)blk.highlight=ex.highlight;}catch{}}nB.push(blk);}else if(type==='textbox'){try{const obj=JSON.parse(decodeURIComponent(p[5]));obj.id=++tbIdCounter;nTb.push(obj);}catch{}}});if(!g)g=nG();if(!rg)rg=nRG();return{nr,nc,g,rg,nB,nTb};}
function applyParsed({nr,nc,g,rg,nB,nTb}){rows=nr;cols=nc;grid=g;regionGrid=rg;blocks=nB;textboxes=nTb;document.getElementById('cols-in').value=nc;document.getElementById('rows-in').value=nr;saveHistory();renderAll();}
function exportText(){const csv=buildCSV();const area=document.getElementById('text-io-area');const box=document.getElementById('text-io-box');area.style.display='flex';box.value=csv;box.select();try{document.execCommand('copy');setStatus('テキストをクリップボードにコピーしました');}catch{setStatus('テキストエリアからコピーしてください');}}
function importText(){const area=document.getElementById('text-io-area');const box=document.getElementById('text-io-box');area.style.display='flex';if(box.value.trim()){try{applyParsed(parseCSV(box.value));setStatus('テキストからインポートしました');box.value='';}catch{setStatus('テキストの解析に失敗しました');}}else{box.value='';box.placeholder='CSVテキストをここに貼り付けてください';box.focus();function onPaste(){setTimeout(()=>{if(box.value.trim()){try{applyParsed(parseCSV(box.value));setStatus('テキストからインポートしました');box.value='';}catch{setStatus('テキストの解析に失敗しました');}box.removeEventListener('input',onPaste);}},100);}box.addEventListener('input',onPaste);setStatus('テキストを貼り付けてください');}}

function makeContamPattern(ctx){const pc=document.createElement('canvas');pc.width=10;pc.height=10;const pctx=pc.getContext('2d');pctx.fillStyle=CONT_COLOR;[[2,2],[7,7]].forEach(([x,y])=>{pctx.beginPath();pctx.arc(x,y,1.8,0,Math.PI*2);pctx.fill();});return ctx.createPattern(pc,'repeat');}
function makeEOPattern(ctx,color){const pc=document.createElement('canvas');pc.width=10;pc.height=10;const pctx=pc.getContext('2d');pctx.fillStyle=color;[[2,2],[7,7],[2,7],[7,2]].forEach(([x,y])=>{pctx.beginPath();pctx.arc(x,y,1.5,0,Math.PI*2);pctx.fill();});return ctx.createPattern(pc,'repeat');}
function makeBarrierPattern(ctx,color){const pc=document.createElement('canvas');pc.width=24;pc.height=24;const pctx=pc.getContext('2d');pctx.fillStyle=color;pctx.fillRect(0,0,24,24);pctx.fillStyle='rgba(255,255,255,0.7)';pctx.fillRect(0,0,24,8);pctx.fillRect(0,12,24,8);const pat=ctx.createPattern(pc,'repeat');try{const m=new DOMMatrix();m.a=Math.cos(-Math.PI/4);m.b=Math.sin(-Math.PI/4);m.c=-Math.sin(-Math.PI/4);m.d=Math.cos(-Math.PI/4);m.e=0;m.f=0;pat.setTransform(m);}catch(e){}return pat;}
function canvasDrawContam(ctx,cx,cy,w,h){const pat=makeContamPattern(ctx);ctx.save();ctx.beginPath();ctx.rect(cx,cy,w,h);ctx.clip();ctx.fillStyle=pat;ctx.fillRect(cx,cy,w,h);ctx.restore();}
function canvasDrawEO(ctx,cx,cy,w,h,color){const pat=makeEOPattern(ctx,color);ctx.save();ctx.globalAlpha=0.75;ctx.beginPath();ctx.rect(cx,cy,w,h);ctx.clip();ctx.fillStyle=pat;ctx.fillRect(cx,cy,w,h);ctx.restore();}
function drawBlockOnCanvas(ctx,blk){const bx=blk.c*CELL,by=blk.r*CELL,bw=blk.cells*CELL,bh=blk.cells*CELL,col=blk.color||'#111';if(blk.barrier){const pat=makeBarrierPattern(ctx,col);ctx.save();ctx.beginPath();ctx.rect(bx,by,bw,bh);ctx.clip();ctx.fillStyle=pat;ctx.fillRect(bx-bw-bh,by-bw-bh,bw*4,bh*4);ctx.restore();}else{ctx.fillStyle=col;ctx.fillRect(bx,by,bw,bh);}if(blk.highlight&&blk.highlight.sz>0){const hw=blk.highlight.sz;ctx.strokeStyle=blk.highlight.col;ctx.lineWidth=hw*2;ctx.save();ctx.beginPath();ctx.rect(bx,by,bw,bh);ctx.clip();ctx.strokeRect(bx,by,bw,bh);ctx.restore();}else{ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=1.5;ctx.strokeRect(bx,by,bw,bh);}if(blk.textLabel&&blk.textLabel.txt){const tl=blk.textLabel;if(tl.bg&&tl.bg!=='transparent'){ctx.fillStyle=hexAlpha(tl.bg,1);const tw=ctx.measureText(tl.txt).width;ctx.fillRect(bx+bw/2-tw/2-2,by+bh/2-tl.sz/2-1,tw+4,tl.sz+2);}ctx.font=`${tl.sz}px sans-serif`;ctx.fillStyle=tl.col;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(tl.txt,bx+bw/2,by+bh/2);}}

// 縦書き廃止: 常に横書きのみ
function drawTbOnCanvas(ctx,tb){
  const x=tb.c*CELL,y=tb.r*CELL,w=tb.w*CELL,h=tb.h*CELL;
  if(tb.bg&&tb.bg!=='transparent'){ctx.fillStyle=hexAlpha(tb.bg,tb.alpha??1);ctx.fillRect(x,y,w,h);}
  if(tb.border>0){ctx.strokeStyle=tb.bcolor||'#000';ctx.lineWidth=tb.border;ctx.strokeRect(x,y,w,h);}
  if(!tb.text)return;
  ctx.fillStyle=tb.fcolor||'#000';
  ctx.font=`${tb.bold?'bold ':''}${tb.fsize}px sans-serif`;
  const lines=tb.text.split('\n');const lH=tb.fsize*1.2;const tH=lines.length*lH;
  ctx.textAlign='center';ctx.textBaseline='middle';
  let ty=y+h/2-tH/2+lH/2;
  lines.forEach(line=>{ctx.fillText(line,x+w/2,ty);ty+=lH;});
}

function buildMapCanvas(withLegend=false){
  const W=cols*CELL,H=rows*CELL;const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);
  if(effectVisible){for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){if(isBlockCell(r,c))continue;const t=grid[r][c];const cx=c*CELL,cy=r*CELL;if(t==='blocked'){ctx.fillStyle='#888';ctx.fillRect(cx,cy,CELL,CELL);}else if(t==='contaminated')canvasDrawContam(ctx,cx,cy,CELL,CELL);else if(isEffectOtherTile(t))canvasDrawEO(ctx,cx,cy,CELL,CELL,effectOtherTileColor(t));}}else{for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){if(grid[r][c]==='blocked'&&!isBlockCell(r,c)){ctx.fillStyle='#888';ctx.fillRect(c*CELL,r*CELL,CELL,CELL);}}}
  if(regionVisible){for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){if(isBlockCell(r,c))continue;const cell=regionGrid[r][c];if(!cell)continue;ctx.fillStyle=hexAlpha(cell.hex,cell.alpha);ctx.fillRect(c*CELL,r*CELL,CELL,CELL);}}
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){const t=grid[r][c];if(!isGapTile(t))continue;const col=gapTileColor(t);if(!col)continue;ctx.globalAlpha=0.5;ctx.fillStyle=col;ctx.fillRect(c*CELL,r*CELL,CELL,CELL);ctx.globalAlpha=1;}
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1;for(let c=0;c<=cols;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,H);ctx.stroke();}for(let r=0;r<=rows;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(W,r*CELL);ctx.stroke();}
  blocks.forEach(blk=>drawBlockOnCanvas(ctx,blk));
  if(regionVisible){blocks.forEach(blk=>{for(let dr=0;dr<blk.cells;dr++) for(let dc=0;dc<blk.cells;dc++){const r=blk.r+dr,c=blk.c+dc;const cell=regionGrid[r]?.[c];if(!cell)continue;ctx.fillStyle=hexAlpha(cell.hex,cell.alpha);ctx.fillRect(c*CELL,r*CELL,CELL,CELL);}});}
  if(effectVisible){blocks.forEach(blk=>{for(let dr=0;dr<blk.cells;dr++) for(let dc=0;dc<blk.cells;dc++){const r=blk.r+dr,c=blk.c+dc;const t=grid[r]?.[c];const cx=c*CELL,cy=r*CELL;if(t==='contaminated')canvasDrawContam(ctx,cx,cy,CELL,CELL);else if(isEffectOtherTile(t))canvasDrawEO(ctx,cx,cy,CELL,CELL,effectOtherTileColor(t));}});}
  if(tbVisible){textboxes.forEach(tb=>drawTbOnCanvas(ctx,tb));}
  if(withLegend){drawLegendOnCanvas(ctx);}
  return canvas;
}
function drawLegendOnCanvas(ctx){const entries=[];const used=new Set();blocks.filter(b=>b.type==='base').forEach(b=>{const key=(b.colorKey||b.color||'').toLowerCase();if(used.has(key))return;used.add(key);entries.push({color:b.color||'#111',name:b.allianceName||allianceNameMap[key]||'Unknown Alliance'});});const pad=8,rowH=14,w=220,h=pad*2+16+entries.length*rowH;const x=Math.max(6,cols*CELL-w-8),y=8;ctx.save();ctx.fillStyle='rgba(255,255,255,0.95)';ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=1;ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h);ctx.fillStyle='#111';ctx.font='bold 12px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('Alliance Legend',x+pad,y+pad-2);ctx.font='11px sans-serif';entries.forEach((e,i)=>{const ry=y+pad+16+i*rowH;ctx.fillStyle=e.color;ctx.fillRect(x+pad,ry+1,12,12);ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.strokeRect(x+pad,ry+1,12,12);ctx.fillStyle='#222';ctx.fillText(e.name,x+pad+18,ry+1);});ctx.restore();}

  const px=(clientX-rect.left)/scale,py=(clientY-rect.top)/scale;
  if(!(px>=tb.c*CELL&&px<=(tb.c+tb.w)*CELL&&py>=tb.r*CELL&&py<=(tb.r+tb.h)*CELL))return false;

function blockOccupies(blk,r,c){return r>=blk.r&&r<blk.r+blk.cells&&c>=blk.c&&c<blk.c+blk.cells;}
function isBlockCell(r,c,exId=null){return blocks.some(b=>b.id!==exId&&blockOccupies(b,r,c));}
function canPlace(tr,tc,cells,exId=null){if(tr<0||tc<0||tr+cells>rows||tc+cells>cols)return false;for(let dr=0;dr<cells;dr++) for(let dc=0;dc<cells;dc++){if(grid[tr+dr][tc+dc]==='blocked')return false;if(isBlockCell(tr+dr,tc+dc,exId))return false;}return true;}
function blockTopLeft(r,c,cells){const h=Math.floor(cells/2);return{tr:r-h,tc:c-h};}
function blockAtCell(r,c){return blocks.find(b=>blockOccupies(b,r,c))||null;}
function isEffectOtherTile(t){return t&&t.startsWith('effectother_');}
function effectOtherTileColor(t){return '#'+t.replace('effectother_','');}
function effectOtherKey(color){return 'effectother_'+color.replace('#','');}
function isGapTile(t){return t&&t.startsWith('gap_');}
function gapTileColor(t){if(t==='gap_transparent')return null;return '#'+t.replace('gap_','');}

function floodFillContaminated(sr,sc){return grid[sr]?.[sc]==='contaminated'?0:floodFillEnclosed(sr,sc,'contaminated',(r,c)=>isBlockCell(r,c)||grid[r][c]==='contaminated'||grid[r][c]==='blocked');}
function floodFillBlocked(sr,sc){return grid[sr]?.[sc]==='blocked'?0:floodFillEnclosed(sr,sc,'blocked',(r,c)=>isBlockCell(r,c)||grid[r][c]==='blocked');}
