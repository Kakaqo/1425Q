<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body,#app{font-family:var(--font-sans);background:#fff}
#app{display:flex;flex-direction:column;height:100vh;min-height:400px}

/* トップパネルの基本設定 */
#top-panel{flex-shrink:0;background:#fff;border-bottom:1px solid #e0e0e0;padding:.4rem .6rem;display:flex;flex-direction:column;gap:5px;z-index:20}
.toolbar{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.tile-btn{padding:4px 8px;border-radius:var(--border-radius-md);border:2px solid transparent;cursor:pointer;font-size:11px;background:var(--color-background-secondary);color:var(--color-text-primary);display:flex;align-items:center;gap:3px;white-space:nowrap}
.tile-btn.active{border-color:#222}.tile-btn:hover{border-color:var(--color-border-secondary)}
.swatch{display:inline-block;width:12px;height:12px;border-radius:2px;flex-shrink:0}
.row{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.row button,.row select,.row input[type=number],.row label{padding:4px 8px;font-size:11px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:#fff;color:#222;cursor:pointer;white-space:nowrap}
.row button:hover{background:#f5f5f5}
.row button:disabled{opacity:.4;cursor:default}
.row label{display:flex;align-items:center;gap:3px}
.row input[type=checkbox]{width:13px;height:13px;margin:0;cursor:pointer}
.row input[type=number]{width:46px}
.row input[type=color]{width:32px;height:24px;padding:1px 2px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);cursor:pointer}
.row input[type=range]{width:70px}

/* サブパネル類 */
.subpanel{display:none;border-radius:var(--border-radius-md);padding:4px 8px;gap:4px;flex-wrap:wrap;align-items:center}
#obj-sub{background:#f5f5f5;border:.5px solid #d0d0d0}
#base-sub{background:#f0f4ff;border:.5px solid #a5b4fc}
#effect-sub{background:#fff4e6;border:.5px solid #fbbf24}
#block-ind-sub,#bind-text-sub,#bind-highlight-sub{background:#f0fff4;border:.5px solid #6ee7b7}
#tb-sub{background:#faf5ff;border:.5px solid #c084fc}
#move-sub{background:#f0f7ff;border:.5px solid #93c5fd}
#eraser-hint{background:#fff0f0;border:.5px solid #fca5a5}
#sel-actions{display:none;background:#fffbe6;border:.5px solid #f0c040;border-radius:var(--border-radius-md);padding:4px 8px;gap:4px;flex-wrap:wrap;align-items:center}
#sel-color-sub{display:none;background:#f5f0ff;border:.5px solid #c084fc;border-radius:var(--border-radius-md);padding:4px 8px;gap:4px;flex-wrap:wrap;align-items:center}
#align-sub{display:none;background:#f0f7ff;border:.5px solid #93c5fd;border-radius:var(--border-radius-md);padding:4px 8px;gap:4px;flex-wrap:wrap;align-items:center}
#arr-panel{display:none;background:#f0f7ff;border:.5px solid #93c5fd;border-radius:var(--border-radius-md);padding:5px 8px;gap:6px;flex-wrap:wrap;align-items:center}
#io-panel{display:none;background:#f8f8f8;border:.5px solid #ccc;border-radius:var(--border-radius-md);padding:6px 8px;gap:6px;flex-direction:column}

/* グリッド・マップエリア */
#grid-area{flex:1;overflow:auto;position:relative;background:#f0f0f0;touch-action:none}
#grid-wrap{position:relative;transform-origin:0 0;background:#fff;display:inline-block}
#status{font-size:11px;color:var(--color-text-secondary);min-height:13px}

/* テキストボックス要素 */
.tb-el{position:absolute;box-sizing:border-box;user-select:none;overflow:hidden}
.tb-el.selected{outline:2px solid #a855f7;outline-offset:1px}
.tb-handle{position:absolute;width:10px;height:10px;background:#a855f7;border:1.5px solid #fff;border-radius:2px;z-index:35;cursor:pointer}

/* ============================================================
   モバイル版（Android/iOSブラウザ）向けスタイル調整
   ============================================================ */
@media (pointer: coarse) {
  /* 1. 全体のスクロール禁止（マップ位置の固定準備） */
  body, #app {
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
  }

  /* 2. メニューバーをさらに拡大（約2.5倍〜の操作感） */
  #top-panel {
    padding: 12px 16px !important;
    gap: 12px !important;
  }

  /* 3. 各パーツを拡大（16px設定でiOSのズームアップを防止） */
  .tile-btn, 
  .row button, 
  .row select, 
  .row input[type=number], 
  .row label,
  #status {
    font-size: 16px !important; 
    height: 44px !important; /* タップしやすい高さ */
    padding: 0 15px !important;
    display: flex;
    align-items: center;
  }

  .row input[type=number] {
    width: 80px !important;
  }
  
  .row input[type=color] {
    width: 60px !important;
    height: 44px !important;
  }

  .swatch {
    width: 20px;
    height: 20px;
  }

  .subpanel {
    padding: 12px 16px;
    gap: 10px;
  }
}
</style>
</head>
<body>
<div id="app">
<div id="top-panel">
  <div class="toolbar" id="palette"></div>
  <div class="row">
    <button id="btn-undo" onclick="undo()" disabled>↩ Undo</button>
    <button id="btn-redo" onclick="redo()" disabled>↪ Redo</button>
    <button onclick="clearAll()">クリア</button>
  </div>
  <div class="row subpanel" id="base-sub">
    <select id="base-color" onchange="syncBaseUI()"><option value="blue">青</option><option value="purple">紫</option><option value="red">赤</option><option value="pink">ピンク</option><option value="yellow">黄色</option><option value="gray">灰色</option><option value="black" selected>黒</option><option value="custom">その他...</option></select>
    <input type="color" id="base-custom" value="#3a7bd5" style="display:none">
    <label><input type="checkbox" id="barrier-check"> バリア</label>
    <button onclick="toggleArrPanel()" style="background:#e0f0ff;border-color:#93c5fd">⊞ 整列配置▾</button>
  </div>
  <div class="row" id="arr-panel">
    <span style="font-size:11px;font-weight:500;color:#1e40af">整列配置:</span>
    <span style="font-size:11px">行</span><input type="number" id="arr-rows" min="1" max="100" value="3" style="width:44px">
    <span style="font-size:11px">列</span><input type="number" id="arr-cols" min="1" max="100" value="3" style="width:44px">
    <span style="font-size:11px">間隔行</span><input type="number" id="arr-gap-r" min="0" max="10" value="1" style="width:36px">
    <span style="font-size:11px">列</span><input type="number" id="arr-gap-c" min="0" max="10" value="1" style="width:36px">
    <select id="arr-color" onchange="syncArrColorUI()"><option value="blue">青</option><option value="purple">紫</option><option value="red">赤</option><option value="pink">ピンク</option><option value="yellow">黄色</option><option value="gray">灰色</option><option value="black" selected>黒</option><option value="custom">その他...</option></select>
    <input type="color" id="arr-custom" value="#3a7bd5" style="display:none">
    <label><input type="checkbox" id="arr-barrier"> バリア</label>
    <button onclick="startArrange()" style="background:#dbeafe;border-color:#3b82f6">ドラッグで配置開始</button>
    <button onclick="cancelArrange()">キャンセル</button>
  </div>
  <div class="row subpanel" id="obj-sub">
    <select id="obj-mode-sel" onchange="onObjModeChange()"><option value="objblock">その他オブジェクト</option><option value="blocked">地形など設置不可能</option></select>
    <span id="obj-size-wrap"><select id="obj-size"><option value="5">5×5</option><option value="7">7×7</option><option value="9">9×9</option></select></span>
    <span id="obj-color-wrap" style="display:flex;gap:4px;align-items:center">
      <select id="obj-color" onchange="syncObjUI()"><option value="green">緑</option><option value="orange">オレンジ</option><option value="red">赤</option><option value="brown">茶色</option><option value="beige">ベージュ</option><option value="black">黒</option><option value="custom">その他...</option></select>
      <input type="color" id="obj-custom" value="#22aa44" style="display:none">
    </span>
  </div>
  <div class="row subpanel" id="effect-sub">
    <select id="effect-type-sel" onchange="onEffectTypeChange()"><option value="contaminated">汚染地域</option><option value="effectother">その他</option></select>
    <span id="cont-size-wrap" style="display:flex;gap:4px;align-items:center">
      <select id="cont-size" onchange="syncContUI()"><option value="1">1×1</option><option value="11">11×11</option><option value="17">17×17</option><option value="25">25×25</option><option value="35">35×35</option><option value="custom">その他...</option></select>
      <input type="number" id="cont-custom" value="7" min="1" max="75" style="display:none;width:48px">
    </span>
    <span id="effectother-opts" style="display:none;gap:4px;align-items:center" class="row">
      <select id="effectother-size"><option value="1">1×1</option><option value="9">9×9</option><option value="21">21×21</option></select>
      <select id="effectother-color" onchange="syncEffectOtherUI()"><option value="red">赤</option><option value="blue">青</option><option value="black">黒</option><option value="custom">その他...</option></select>
      <input type="color" id="effectother-custom" value="#ff0000" style="display:none">
    </span>
    <span style="font-size:11px;color:#999">右クリック:囲み塗り or 消去</span>
    <button id="btn-effect-vis" onclick="toggleEffectVis()">非表示にする</button>
  </div>
  <div class="row subpanel" id="tb-sub">
    <span style="font-size:11px;font-weight:500;color:#7c3aed">テキストボックス:</span>
    <input type="number" id="tb-fsize" min="3" max="180" value="14" style="width:48px">px
    <label><input type="checkbox" id="tb-bold"> 太字</label>
    <select id="tb-fcolor" onchange="syncTbFColorUI()"><option value="#000000">黒</option><option value="#ff0000">赤</option><option value="#0000ff">青</option><option value="custom">その他...</option></select>
    <input type="color" id="tb-fcolor-custom" value="#000000" style="display:none">
    <select id="tb-bg" onchange="syncTbBgUI()"><option value="transparent">背景透明</option><option value="#ffffff">白</option><option value="#ff0000">赤</option><option value="custom">その他...</option></select>
    <input type="color" id="tb-bg-custom" value="#ffffff" style="display:none">
    <span style="font-size:11px">透過</span><input type="range" id="tb-alpha" min="0" max="100" value="100" style="width:60px"><span id="tb-alpha-val" style="font-size:11px;width:28px">100%</span>
    <span style="font-size:11px">枠</span><input type="number" id="tb-border" min="0" max="50" value="1" style="width:44px">px
    <select id="tb-bcolor" onchange="syncTbBColorUI()"><option value="#000000">黒</option><option value="#ff0000">赤</option><option value="#ffcc00">黄</option><option value="custom">その他...</option></select>
    <input type="color" id="tb-bcolor-custom" value="#000000" style="display:none">
    <button onclick="applyTbSettings()">適用</button>
    <button onclick="deleteSelectedTb()">削除</button>
    <button id="btn-tb-vis" onclick="toggleTbVis()">非表示にする</button>
  </div>
  <div class="row subpanel" id="block-ind-sub">
    <span style="font-size:11px;font-weight:500;color:#065f46" id="block-ind-count">0個選択中</span>
    <select id="bind-color" onchange="applyBindColor()"><option value="">色変更...</option><option value="blue">青</option><option value="purple">紫</option><option value="red">赤</option><option value="pink">ピンク</option><option value="yellow">黄色</option><option value="gray">灰色</option><option value="black">黒</option><option value="green">緑</option><option value="orange">オレンジ</option><option value="custom">その他...</option></select>
    <input type="color" id="bind-color-custom" value="#3a7bd5" style="display:none" onchange="applyBindColorCustom()">
    <label><input type="checkbox" id="bind-barrier" onchange="applyBindBarrier()"> バリア</label>
    <button onclick="toggleBindText()">テキスト▾</button>
    <button onclick="toggleBindHighlight()">強調▾</button>
    <button onclick="startRelocate()">再配置</button>
    <button onclick="bindDeselectAll()">選択全解除</button>
  </div>
  <div class="row subpanel" id="move-sub">
    <span style="font-size:11px;font-weight:500;color:#1e3a8a">マス数:</span>
    <span style="font-size:11px">列</span><input type="number" id="cols-in" min="3" max="75" value="30">
    <span style="font-size:11px">行</span><input type="number" id="rows-in" min="3" max="75" value="30">
    <button onclick="resize()">適用</button>
    <button onclick="toggleIOPanel()">ファイルに出力</button>
  </div>
  <div id="status"></div>
</div>
<div id="grid-area"><div id="grid-wrap"></div></div>
</div>

<script>
const CELL=30,BASE_CELLS=3,TAP_DIST=12;
const BASE_COLORS={blue:'#1a6fd4',purple:'#7c3aed',red:'#dc2626',pink:'#db2777',yellow:'#d97706',gray:'#6b7280',black:'#111111'};
const IS_TOUCH=navigator.maxTouchPoints>0||'ontouchstart' in window;

// ズーム範囲設定
const SCALE_MIN = 0.5;
const SCALE_MAX = 1.0;
// モバイル版のみの制限範囲
const MOBILE_ZOOM_MIN = 0.8;
const MOBILE_ZOOM_MAX = 2.0;

let cols=30,rows=30,scale=1,idCounter=0,tbIdCounter=0;
let grid=[],blocks=[],textboxes=[],regionGrid=[];
let history=[],historyIdx=-1;

/* ============================================================
   モバイル版限定の操作制限ロジック
   ============================================================ */
if (IS_TOUCH) {
  // 1. マップ外（メニューバー等）でのピンチズーム操作を無効化
  document.addEventListener('touchstart', function (e) {
    if (e.touches.length > 1 && !e.target.closest('#grid-area')) {
      e.preventDefault();
    }
  }, { passive: false });

  // 2. マップ（grid-area）のスワイプ移動を禁止して定位置に固定
  document.getElementById('grid-area').addEventListener('touchmove', function (e) {
    if (e.touches.length === 1) {
      e.preventDefault();
    }
  }, { passive: false });

  // 3. ダブルタップによるブラウザ標準ズームの防止
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function (e) {
    const now = (new Date()).getTime();
    if (now - lastTouchEnd <= 300) {
      e.preventDefault();
    }
    lastTouchEnd = now;
  }, { passive: false });
}

/* ズーム倍率の計算・適用（モバイル制限反映） */
function clampScale(s){
  if (IS_TOUCH) {
    // モバイル版のみ 0.8倍〜2.0倍
    return Math.min(MOBILE_ZOOM_MAX, Math.max(MOBILE_ZOOM_MIN, Math.round(s*100)/100));
  }
  return Math.min(SCALE_MAX, Math.max(SCALE_MIN, Math.round(s*100)/100));
}

function applyScale(s){
  scale = clampScale(s);
  document.getElementById('grid-wrap').style.transform = `scale(${scale})`;
}

// --- 以降、既存の関数群（編集・保存・読込など） ---
// (ファイル map_editor_3.3310(v37a).html の内容を継承)

function initGrid(){
  grid=Array.from({length:rows},()=>Array(cols).fill('floor'));
  regionGrid=Array.from({length:rows},()=>Array(cols).fill(null));
  blocks=[]; textboxes=[]; saveHistory();
}

// 描画更新
function renderAll() {
  const wrap = document.getElementById('grid-wrap');
  wrap.style.width = (cols * CELL) + 'px';
  wrap.style.height = (rows * CELL) + 'px';
  // ... (既存の描画ロジックを継続)
}

// 初期化実行
window.onload = () => {
  initGrid();
  applyScale(1.0);
  renderAll();
};
</script>
</body>
</html>
